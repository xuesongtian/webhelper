services:
  postgres:
    image: postgres:16-alpine
    container_name: jianzhan-assistant-postgres
    environment:
      POSTGRES_DB: jianzhan_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jianzhan_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
